<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flappy Bird Clone</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: skyblue;
    }
    canvas {
      background: lightblue;
      border: 2px solid black;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="400" height="500"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Game variables
    let birdY = 200;
    let birdX = 50;
    let birdRadius = 15;
    let gravity = 0.6;
    let lift = -10;
    let velocity = -6;

    let pipes = [];
    let frame = 0;
    let score = 0;
    let gameOver = false;

    function drawBird() {
      ctx.beginPath();
      ctx.arc(birdX, birdY, birdRadius, 0, Math.PI * 2);
      ctx.fillStyle = "yellow";
      ctx.fill();
      ctx.stroke();
    }

    function drawPipes() {
      for (let i = 0; i < pipes.length; i++) {
        let pipe = pipes[i];
        ctx.fillStyle = "green";
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height - pipe.bottom);
      }
    }

    function updatePipes() {
      if (frame % 90 === 0) {
        let gap = 120;
        let top = Math.random() * (canvas.height - gap - 50) + 20;
        pipes.push({
          x: canvas.width,
          width: 40,
          top: top,
          bottom: top + gap
        });
      }

      for (let i = 0; i < pipes.length; i++) {
        let pipe = pipes[i];
        pipe.x -= 2;

        // Check collision
        if (
          birdX + birdRadius > pipe.x &&
          birdX - birdRadius < pipe.x + pipe.width &&
          (birdY - birdRadius < pipe.top || birdY + birdRadius > pipe.bottom)
        ) {
          gameOver = true;
        }

        // Score
        if (pipe.x + pipe.width === birdX) {
          score++;
        }
      }

      // Remove off-screen pipes
      pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
    }

    function drawScore() {
      ctx.fillStyle = "black";
      ctx.font = "20px Arial";
      ctx.fillText("Score: " + score, 10, 25);
    }

    function gameLoop() {
      if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("Game Over", 100, 250);
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Bird physics
      velocity += gravity;
      birdY += velocity;

      if (birdY + birdRadius > canvas.height) {
        gameOver = true;
      }

      drawBird();
      updatePipes();
      drawPipes();
      drawScore();

      frame++;
      requestAnimationFrame(gameLoop);
    }

    // Controls
    document.addEventListener("keydown", function (e) {
      if (e.code === "Space") {
        velocity = lift;
      }
    });
    canvas.addEventListener("click", function () {
      velocity = lift;
    });

    gameLoop();
  </script>
</body>
</html>
